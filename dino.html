<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de dinossauros</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="titulo-main">
    <h2 class="titulo-dino">Dinossauros</h2>
    </div>
    <h1 class="subtitulo-main" id="nome-dino"></h1>
    <section class="seçao">
    <div class="conteudo-dino">
        <div class="conteudo-principal">
        <div class="texto-esquerdo">
            <div class="descricao">
                <h3 class="subtitulo-dino">Descrição</h3>
            <p id="descricao-dino">
            </p>
            </div>
            <div class="descoberta">
                <h3 class="subtitulo-dino">Descoberta</h3>

                <p id="descoberta-dino">       
                </p>
            </div>
        
            <div class="paleoecologia">
                <h3 class="subtitulo-dino">Paleoecologia</h3>
                <p id="paleoecologia-dino">.
                </p>
            </div>
        </div>
        <div class="img-dino">
            <img id="imagem-dino" src="imgs/rex.png" alt="Tiranossauro rex">
        </div>
        </div>
            <div class="informaçoes">
                <h3 class="subtitulo-respostas">Informações</h3>
                <div class="informaçao">
                <div class="info-linha">
                <label class="subtitulo-informaçao">Altura</label>
                <span id="altura-dino" class="resposta">3,5 metros</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Era</label>
                <span id="era-dino" class="resposta">Cretáceo</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Dieta</label>
                <span id="dieta-dino" class="resposta">Presas vivas</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Comprimento</label>
                <span id="comprimento-dino" class="resposta">12 metros</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Família</label>
                <span id="familia-dino" class="resposta">Tyrannosauridae</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Gênero</label>
                <span id="genero-dino" class="resposta">Tyrannosaurus</span>
                
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Ovos</label>
                <span id="ovos-dino" class="resposta">15-20</span>
                </div>
                
                <div class="info-linha">
                <label class="subtitulo-informaçao">Peso</label>
                <span id="peso-dino" class="resposta">9T</span>
                </div>
            </div>
            </div>
    </div>
    <script src="dino.js"></script>
</body>
</html>
